<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>03 Agenda</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="slides.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; height: 100vh; background: #000; overflow: hidden; }
  .frame {
    position: absolute;
    width: 1920px; height: 1080px;
    transform-origin: top left;
  }
</style>
<script>
  function fit() {
    const f = document.querySelector('.frame');
    const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    f.style.transform = 'scale(' + s + ')';
    // Center the scaled box
    const sw = 1920 * s, sh = 1080 * s;
    f.style.left = ((window.innerWidth - sw) / 2) + 'px';
    f.style.top  = ((window.innerHeight - sh) / 2) + 'px';
  }
  window.addEventListener('resize', fit);
  window.addEventListener('load', () => { fit(); if (window.lucide) lucide.createIcons(); });
</script>
</head>
<body>
<div class="frame">
<section class="s-agenda" data-screen-label="03 Agenda">
    <div class="header">
      <div class="eyebrow">Today</div>
      <h1>What we'll cover<span class="green-dot">.</span></h1>
    </div>
    <div class="list">
      <div class="item current">
        <span class="num">01</span>
        <span class="label">Why the alliance, why now</span>
        <span class="dur">10 min</span>
      </div>
      <div class="item">
        <span class="num">02</span>
        <span class="label">Our delivery playbook</span>
        <span class="dur">15 min</span>
      </div>
      <div class="item">
        <span class="num">03</span>
        <span class="label">Three client stories</span>
        <span class="dur">20 min</span>
      </div>
      <div class="item">
        <span class="num">04</span>
        <span class="label">What's next, and how to engage</span>
        <span class="dur">10 min</span>
      </div>
    </div>
    <div class="footer">
      <img src="../assets/deloitte-wordmark.svg" alt="Deloitte">
      <span class="right">03 / 10</span>
    </div>
  </section>
</div>
</body>
</html>
