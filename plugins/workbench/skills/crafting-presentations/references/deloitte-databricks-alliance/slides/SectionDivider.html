<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>02 Section divider</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="slides.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; height: 100vh; background: #000; overflow: hidden; }
  .frame {
    position: absolute;
    width: 1920px; height: 1080px;
    transform-origin: top left;
  }
</style>
<script>
  function fit() {
    const f = document.querySelector('.frame');
    const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    f.style.transform = 'scale(' + s + ')';
    // Center the scaled box
    const sw = 1920 * s, sh = 1080 * s;
    f.style.left = ((window.innerWidth - sw) / 2) + 'px';
    f.style.top  = ((window.innerHeight - sh) / 2) + 'px';
  }
  window.addEventListener('resize', fit);
  window.addEventListener('load', () => { fit(); if (window.lucide) lucide.createIcons(); });
</script>
</head>
<body>
<div class="frame">
<section class="s-divider" data-screen-label="02 Section divider">
    <div class="num">01 / 04</div>
    <div class="label">Section</div>
    <div class="title">Where the alliance<br>delivers value<span class="green-dot">.</span></div>
  </section>
</div>
</body>
</html>
