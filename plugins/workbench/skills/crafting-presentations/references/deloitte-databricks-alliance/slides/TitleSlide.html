<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>01 Title</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="slides.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; height: 100vh; background: #000; overflow: hidden; }
  .frame {
    position: absolute;
    width: 1920px; height: 1080px;
    transform-origin: top left;
  }
</style>
<script>
  function fit() {
    const f = document.querySelector('.frame');
    const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    f.style.transform = 'scale(' + s + ')';
    // Center the scaled box
    const sw = 1920 * s, sh = 1080 * s;
    f.style.left = ((window.innerWidth - sw) / 2) + 'px';
    f.style.top  = ((window.innerHeight - sh) / 2) + 'px';
  }
  window.addEventListener('resize', fit);
  window.addEventListener('load', () => { fit(); if (window.lucide) lucide.createIcons(); });
</script>
</head>
<body>
<div class="frame">
<section class="s-title" data-screen-label="01 Title">
    <div class="alliance-strip">
      <img src="../assets/deloitte-wordmark.svg" alt="Deloitte">
      <div class="divider"></div>
      <img class="dbx" src="../assets/databricks-wordmark.svg" alt="Databricks">
    </div>
    <div>
      <div class="hero">Lakehouse,<br>simplified<span class="green-dot">.</span></div>
      <div class="deck-sub">How the Deloitte+Databricks Alliance helps enterprise teams move from legacy data stacks to a unified intelligence platform, in weeks, not quarters.</div>
    </div>
    <div class="meta-row">
      <span>Internal · Q2 2026</span>
      <span>Alliance Practice</span>
      <span>v1.0</span>
    </div>
    <img class="motif" src="../assets/motif-blocks.svg" alt="">
  </section>
</div>
</body>
</html>
